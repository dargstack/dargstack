version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - gocritic
    - nolintlint
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    errcheck:
      exclude-functions:
        - (io.Closer).Close

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dargstack/dargstack/v4

issues: {}
