version: 2

builds:
  - id: dargstack
    main: ./cmd/dargstack
    binary: dargstack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dargstack/dargstack/internal/version.Version={{.Version}}
      - -X github.com/dargstack/dargstack/internal/version.Commit={{.Commit}}
      - -X github.com/dargstack/dargstack/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: dargstack
    name: dargstack
  prerelease: auto
