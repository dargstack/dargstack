name: CI

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

permissions: {}

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@661e39fe1c9e484d94c6a5a9d4c9946d57c41771 # 5.1.0
    permissions:
      pull-requests: read
  release_semantic_dry:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Release (semantic, dry)
    uses: dargmuesli/github-actions/.github/workflows/release-semantic.yml@661e39fe1c9e484d94c6a5a9d4c9946d57c41771 # 5.1.0
    permissions:
      contents: write
      id-token: write
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    with:
      DRY_RUN: true
      EXTRA_PLUGINS: |
        @semantic-release/exec
  check-docs:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Update generated docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Regenerate docs
        run: go run ./internal/tools/docgen ./docs
      - name: Commit and push updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Docs are already up to date"
          else
            git commit -m "chore: update generated docs"
            git push
          fi
  build:
    name: Build
    uses: dargmuesli/github-actions/.github/workflows/docker.yml@661e39fe1c9e484d94c6a5a9d4c9946d57c41771 # 5.1.0
    needs: release_semantic_dry
    permissions:
      packages: write
    with:
      BUILD_ARGUMENTS: ${{ (needs.release_semantic_dry.outputs.new_release_version != null) && format('RELEASE_NAME={0}', needs.release_semantic_dry.outputs.new_release_version) || '' }}
      TAG: ${{ (needs.release_semantic_dry.outputs.new_release_version != null) && needs.release_semantic_dry.outputs.new_release_version || '' }}
  release_semantic:
    needs: [build, check-docs]
    name: Release (semantic)
    uses: dargmuesli/github-actions/.github/workflows/release-semantic.yml@661e39fe1c9e484d94c6a5a9d4c9946d57c41771 # 5.1.0
    permissions:
      contents: write
      id-token: write
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    with:
      EXTRA_PLUGINS: |
        @semantic-release/exec
