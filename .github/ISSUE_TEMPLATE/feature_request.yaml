name: Feature Request
description: Suggest a feature for dargstack
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Description
      description: What feature would you like?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use Case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed Solution
      description: How should this work?
